<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vexalyn Donghua is a premium donghua streaming discovery platform with cinematic browsing, search, genres, and curated series."
    />
    <title>Vexalyn Donghua</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="site-shell">
      <header class="navbar" data-navbar>
        <a class="brand" href="#home" aria-label="Vexalyn Donghua home">
          <span class="brand-mark"><i data-lucide="sparkles"></i></span>
          <span>Vexalyn Donghua</span>
        </a>

        <nav class="nav-links" data-nav-links aria-label="Primary navigation">
          <a href="#home" class="nav-link active"><i data-lucide="home"></i><span>Home</span></a>
          <a href="#popular" class="nav-link"><i data-lucide="star"></i><span>Popular</span></a>
          <a href="#ongoing" class="nav-link"><i data-lucide="film"></i><span>Ongoing</span></a>
          <a href="#genres" class="nav-link"><i data-lucide="layers-3"></i><span>Genres</span></a>
        </nav>

        <form class="nav-search" data-search-form role="search">
          <i data-lucide="search"></i>
          <input
            type="search"
            data-search-input
            placeholder="Search donghua..."
            autocomplete="off"
            aria-label="Search donghua"
          />
        </form>

        <button class="icon-button mobile-menu-button" data-menu-button type="button" aria-label="Open menu">
          <i data-lucide="menu"></i>
        </button>
      </header>

      <main>
        <section class="hero" id="home" aria-label="Featured new movie slider">
          <div class="hero-stage" data-hero-stage>
            <div class="hero-skeleton skeleton-panel"></div>
          </div>
          <div class="hero-controls" aria-label="Hero slider controls">
            <button class="icon-button" data-hero-prev type="button" aria-label="Previous title">
              <i data-lucide="chevron-left"></i>
            </button>
            <div class="hero-dots" data-hero-dots></div>
            <button class="icon-button" data-hero-next type="button" aria-label="Next title">
              <i data-lucide="chevron-right"></i>
            </button>
          </div>
        </section>

        <section class="search-panel reveal-3d" data-search-panel hidden>
          <div class="section-heading">
            <div>
              <p class="eyebrow">Discovery</p>
              <h2>Search Results</h2>
            </div>
            <button class="ghost-button" data-search-clear type="button">
              <i data-lucide="x"></i>
              Clear
            </button>
          </div>
          <div class="content-grid compact" data-search-results></div>
        </section>

        <section class="content-section reveal-3d" id="trending">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Now Watching</p>
              <h2>Trending</h2>
            </div>
            <a class="text-link" href="#popular">Explore popular <i data-lucide="arrow-right"></i></a>
          </div>
          <div class="content-grid" data-section="trending"></div>
        </section>

        <section class="content-section reveal-3d" id="latest">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Fresh Episodes</p>
              <h2>Latest Update</h2>
            </div>
          </div>
          <div class="content-grid" data-section="latest"></div>
        </section>

        <section class="content-section reveal-3d" id="popular">
          <div class="section-heading with-tabs">
            <div>
              <p class="eyebrow">Audience Choice</p>
              <h2>Popular Series</h2>
            </div>
            <div class="tabs" data-popular-tabs role="tablist" aria-label="Popular filter">
              <button class="tab active" type="button" data-filter="weekly" role="tab" aria-selected="true">Weekly</button>
              <button class="tab" type="button" data-filter="monthly" role="tab" aria-selected="false">Monthly</button>
              <button class="tab" type="button" data-filter="all" role="tab" aria-selected="false">All</button>
            </div>
          </div>
          <div class="content-grid" data-section="popular"></div>
        </section>

        <section class="content-section reveal-3d" id="ongoing">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Follow Weekly</p>
              <h2>Ongoing Series</h2>
            </div>
          </div>
          <div class="ongoing-list" data-section="ongoing"></div>
        </section>

        <section class="content-section reveal-3d" id="genres">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Browse Mood</p>
              <h2>Genres</h2>
            </div>
          </div>
          <div class="genre-cloud" data-section="genres"></div>
        </section>
      </main>
    </div>
  </body>
</html>
