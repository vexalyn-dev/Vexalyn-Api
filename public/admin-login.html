<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Vexalyn API</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FBF1E3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px;
            max-width: 420px;
            width: 100%;
            border: 4px solid #000;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: #FFAB92;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #000;
            box-shadow: 4px 4px 0 #000;
        }

        .admin-logo svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: #64748b;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 3px solid #000;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
            background: #f8fafc;
            box-shadow: 4px 4px 0 #000;
        }

        .form-input:focus {
            outline: none;
            transform: translateY(-2px);
            box-shadow: 6px 6px 0 #000;
            background: white;
        }

        .error-message {
            display: none;
            background: #fee2e2;
            border: 3px solid #ef4444;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            box-shadow: 3px 3px 0 #000;
        }

        .error-message.show {
            display: block;
        }

        .error-text {
            font-size: 14px;
            font-weight: 600;
            color: #dc2626;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-login {
            width: 100%;
            padding: 16px 24px;
            border: 3px solid #000;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #FFAB92;
            color: #15181F;
            box-shadow: 4px 4px 0 #000;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0 #000;
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 2px 2px 0 #000;
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #FFAB92;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link a:hover {
            color: #15181F;
        }

        .loading {
            display: none;
            text-align: center;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 20px;
            height: 20px;
            margin: 0 auto;
            border: 3px solid rgba(21, 24, 31, 0.3);
            border-top: 3px solid #15181F;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .login-container {
                padding: 32px 24px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="admin-logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V11H5V6.3l7-3.11v8.8z"/>
                </svg>
            </div>
            <h1>Admin Login</h1>
            <p class="subtitle">Maintenance Control Panel</p>
        </div>

        <div class="error-message" id="errorMessage">
            <div class="error-text">
                <span>✕</span>
                <span id="errorText">Email atau password salah!</span>
            </div>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="email">Email Admin</label>
                <input 
                    type="text" 
                    id="email" 
                    class="form-input" 
                    placeholder="admin.maintenance"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText">Login ke Admin Panel</span>
                <span class="loading" id="btnLoading">
                    <span class="spinner"></span> Memverifikasi...
                </span>
            </button>
        </form>

        <div class="back-link">
            <a href="/">← Kembali ke Homepage</a>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (sessionStorage.getItem('admin_token')) {
            window.location.href = '/admin/maintenance';
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');

            // Hide error
            errorMessage.classList.remove('show');

            // Show loading
            loginBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.classList.add('show');

            // Send login request
            fetch('/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    // Save token
                    sessionStorage.setItem('admin_token', data.token);
                    
                    // Redirect to admin panel
                    window.location.href = '/admin/maintenance';
                } else {
                    // Show error
                    document.getElementById('errorText').textContent = data.message || 'Email atau password salah!';
                    errorMessage.classList.add('show');
                    
                    // Reset button
                    loginBtn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.classList.remove('show');
                }
            })
            .catch(error => {
                console.error('Login error:', error);
                document.getElementById('errorText').textContent = 'Terjadi kesalahan. Coba lagi.';
                errorMessage.classList.add('show');
                
                // Reset button
                loginBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.classList.remove('show');
            });
        }
    </script>
</body>
</html>
