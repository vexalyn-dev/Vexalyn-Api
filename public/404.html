<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | Vexalyn API</title>
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#15181F;
  --cream:#FBF1E3;
  --white:#FFFFFF;
  --salmon:#FFAB92;
  --sky:#9BD8F4;
  --lav:#CBC0F5;
  --mint:#9BE3BC;
  --gray:#6B7280;
  --shadow: 6px 6px 0 var(--ink);
  --border: 3px solid var(--ink);
}

body{
  font-family:'Inter',sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.container{
  max-width:600px;
  width:100%;
  text-align:center;
}

/* Logo */
.logo-wrap{
  margin-bottom:40px;
}
.logo{
  width:80px;
  height:80px;
  margin:0 auto 20px;
  position:relative;
}
.logo-shadow{
  position:absolute;
  width:100%;
  height:100%;
  background:var(--ink);
  border-radius:50%;
  top:6px;
  left:6px;
}
.logo-main{
  position:relative;
  width:100%;
  height:100%;
  background:var(--salmon);
  border:var(--border);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Fredoka',sans-serif;
  font-size:48px;
  font-weight:700;
  color:var(--white);
}

/* 404 Badge */
.badge-404{
  display:inline-block;
  padding:16px 32px;
  background:var(--ink);
  border:var(--border);
  box-shadow:var(--shadow);
  margin-bottom:32px;
  position:relative;
  font-family:'Fredoka',sans-serif;
  font-size:64px;
  font-weight:700;
  color:var(--white);
  letter-spacing:4px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
}

/* Content Card */
.card{
  background:var(--white);
  border:var(--border);
  box-shadow:var(--shadow);
  padding:48px 40px;
  margin-bottom:32px;
  position:relative;
}

.card::before{
  content:'';
  position:absolute;
  top:-6px;
  left:-6px;
  right:6px;
  bottom:6px;
  background:var(--sky);
  border:var(--border);
  z-index:-1;
}

h1{
  font-family:'Fredoka',sans-serif;
  font-size:32px;
  font-weight:700;
  color:var(--ink);
  margin-bottom:16px;
}

p{
  font-size:18px;
  color:var(--gray);
  line-height:1.6;
  margin-bottom:32px;
}

/* Buttons */
.btn-group{
  display:flex;
  gap:16px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  display:inline-block;
  padding:16px 32px;
  font-family:'Fredoka',sans-serif;
  font-size:16px;
  font-weight:600;
  text-decoration:none;
  border:var(--border);
  cursor:pointer;
  transition:all .2s ease;
  position:relative;
}

.btn-primary{
  background:var(--salmon);
  color:var(--white);
  box-shadow:4px 4px 0 var(--ink);
}

.btn-primary:hover{
  transform:translate(2px,2px);
  box-shadow:2px 2px 0 var(--ink);
}

.btn-secondary{
  background:var(--white);
  color:var(--ink);
  box-shadow:4px 4px 0 var(--ink);
}

.btn-secondary:hover{
  background:var(--lav);
  transform:translate(2px,2px);
  box-shadow:2px 2px 0 var(--ink);
}

/* Quick Links */
.quick-links{
  margin-top:40px;
  padding:24px;
  background:var(--white);
  border:var(--border);
  box-shadow:4px 4px 0 var(--ink);
}

.quick-links h3{
  font-family:'Fredoka',sans-serif;
  font-size:18px;
  font-weight:600;
  color:var(--ink);
  margin-bottom:16px;
}

.quick-links ul{
  list-style:none;
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
}

.quick-links a{
  display:inline-block;
  padding:8px 16px;
  background:var(--mint);
  border:2px solid var(--ink);
  border-radius:8px;
  color:var(--ink);
  text-decoration:none;
  font-size:14px;
  font-weight:600;
  transition:all .2s ease;
}

.quick-links a:hover{
  background:var(--sky);
  transform:translateY(-2px);
}

/* Responsive */
@media(max-width:640px){
  .badge-404{
    font-size:48px;
    padding:12px 24px;
  }
  
  h1{
    font-size:24px;
  }
  
  p{
    font-size:16px;
  }
  
  .card{
    padding:32px 24px;
  }
  
  .btn{
    padding:12px 24px;
    font-size:14px;
  }
  
  .btn-group{
    flex-direction:column;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo">
      <div class="logo-shadow"></div>
      <div class="logo-main">V</div>
    </div>
  </div>
  
  <!-- 404 Badge -->
  <div class="badge-404">404</div>
  
  <!-- Content Card -->
  <div class="card">
    <h1>Halaman Tidak Ditemukan</h1>
    <p>
      Oops! Halaman yang kamu cari tidak ada atau sudah dipindahkan.
      Tapi tenang, kamu bisa kembali ke homepage atau cek endpoint API kami.
    </p>
    
    <div class="btn-group">
      <a href="/" class="btn btn-primary">
        🏠 Kembali ke Home
      </a>
      <a href="/docs" class="btn btn-secondary">
        📚 Lihat Dokumentasi
      </a>
    </div>
  </div>
  
  <!-- Quick Links -->
  <div class="quick-links">
    <h3>✨ Quick Links</h3>
    <ul>
      <li><a href="/anichin/home">Home API</a></li>
      <li><a href="/anichin/search?q=anime">Search API</a></li>
      <li><a href="/anichin/genres">Genres API</a></li>
      <li><a href="/report">Laporkan Bug</a></li>
      <li><a href="/rate-limit-status">Rate Limit</a></li>
    </ul>
  </div>
</div>

</body>
</html>
