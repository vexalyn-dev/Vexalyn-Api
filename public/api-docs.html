<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Documentation - Vexalyn API</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
:root{
  --ink:#15181F;--cream:#FBF1E3;--white:#FFFFFF;
  --salmon:#FFAB92;--salmon-soft:#FFE4D9;
  --sky:#9BD8F4;--sky-soft:#DCF0FB;
  --lav:#CBC0F5;--lav-soft:#EAE5FC;
  --mint:#9BE3BC;--mint-soft:#DFF7EA;
  --green:#33B96A;--green-dark:#1D7A46;
  --gray:#6B7280;--gray-soft:#9AA0AC;
  --shadow:6px 6px 0 var(--ink);--shadow-sm:4px 4px 0 var(--ink);
  --radius:24px;--radius-sm:16px;--radius-pill:100px;--border:3px solid var(--ink);
}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;}
h1,h2,h3,.brand{font-family:'Fredoka',sans-serif;}
a{text-decoration:none;color:inherit;}
img,svg{display:block;}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px;}

/* Loading */
#loading-screen{
  position:fixed;top:0;left:0;right:0;bottom:0;background:var(--cream);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .4s ease,visibility .4s ease;
}
#loading-screen.hide{opacity:0;visibility:hidden;}
.loader-logo{
  width:80px;height:80px;background:var(--sky);border:var(--border);
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  margin-bottom:24px;animation:float 2s ease-in-out infinite;
}
.loader-logo svg{width:40px;height:40px;stroke:var(--ink);stroke-width:2.5;}
@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-15px) rotate(5deg);}
}
.loader-text{
  font-family:'Fredoka',sans-serif;font-size:20px;font-weight:700;
  color:var(--ink);margin-bottom:16px;
}
.loader-dots{display:flex;gap:8px;}
.loader-dots span{
  width:12px;height:12px;background:var(--ink);border-radius:50%;
  animation:dot-bounce 1.4s ease infinite;
}
.loader-dots span:nth-child(2){animation-delay:.2s;}
.loader-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot-bounce{
  0%,100%{transform:translateY(0);opacity:1;}
  50%{transform:translateY(-20px);opacity:.5;}
}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;
  font-weight:700;font-size:15px;padding:14px 26px;border-radius:var(--radius-pill);
  border:var(--border);box-shadow:var(--shadow-sm);cursor:pointer;
  transition:transform .15s ease,box-shadow .15s ease;white-space:nowrap;
}
.btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
.btn:hover{transform:translate(-1px,-1px);box-shadow:7px 7px 0 var(--ink);}
.btn-green{background:var(--green);color:#fff;}
.btn-white{background:#fff;color:var(--ink);}

/* Header */
.header-outer{padding:22px 24px 0;}
header{
  max-width:1180px;margin:0 auto;background:#fff;border:var(--border);
  border-radius:var(--radius-pill);box-shadow:var(--shadow);
  padding:12px 14px 12px 20px;display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;}
.header-right{display:flex;align-items:center;gap:18px;}

/* Hero */
.docs-hero{padding:80px 24px 60px;text-align:center;}
.docs-hero h1{font-size:48px;font-weight:700;letter-spacing:-.5px;margin-bottom:16px;}
.docs-hero p{color:var(--gray);font-size:17px;font-weight:500;max-width:620px;margin:0 auto 32px;}
.docs-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}

@media(max-width:600px){
  .docs-hero h1{font-size:32px;}
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loader-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
      <path d="M2 17l10 5 10-5"></path>
      <path d="M2 12l10 5 10-5"></path>
    </svg>
  </div>
  <div class="loader-text">Loading API Docs...</div>
  <div class="loader-dots"><span></span><span></span><span></span></div>
</div>

<!-- Header -->
<div class="header-outer">
  <header>
    <a href="/" class="brand">
      <img src="/assets/logo-horizontal.svg" alt="Vexalyn API" height="40" style="display:block;">
    </a>
    <div class="header-right">
      <a href="/" class="btn btn-white">← Kembali</a>
    </div>
  </header>
</div>

<!-- Hero Section -->
<section class="docs-hero">
  <h1>API Documentation</h1>
  <p>Dokumentasi lengkap semua endpoint Vexalyn API dengan Swagger UI interaktif. Test endpoint langsung dari browser!</p>
  <div class="docs-actions">
    <a href="/docs" class="btn btn-green">Buka Swagger UI →</a>
    <a href="/" class="btn btn-white">Ke Beranda</a>
  </div>
</section>

<script>
// Hide loading screen after page loads
window.addEventListener('load', function() {
  const loadingScreen = document.getElementById('loading-screen');
  setTimeout(function() {
    loadingScreen.classList.add('hide');
  }, 300);
});
</script>

</body>
</html>
