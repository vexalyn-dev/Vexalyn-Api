<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<parameter name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - Vexalyn API</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#15181F;
  --cream:#FBF1E3;
  --white:#FFFFFF;
  --salmon:#FFAB92;
  --sky:#9BD8F4;
  --mint:#9BE3BC;
  --green:#33B96A;
  --green-dark:#1D7A46;
  --gray:#6B7280;
  --gray-soft:#9AA0AC;
  --shadow: 6px 6px 0 var(--ink);
  --shadow-sm: 4px 4px 0 var(--ink);
  --shadow-lg: 8px 8px 0 var(--ink);
  --radius: 24px;
  --radius-sm: 16px;
  --radius-pill: 100px;
  --border: 3px solid var(--ink);
}

html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px 20px;
  -webkit-font-smoothing:antialiased;
  overflow-y:auto;
}

h1,h2,h3{font-family:'Fredoka',sans-serif;}

/* Loading Screen */
#loading-screen{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:var(--cream);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:opacity .3s ease, visibility .3s ease;
}
#loading-screen.hide{opacity:0;visibility:hidden;}

.loader-logo{
  width:80px;height:80px;
  background:var(--sky);
  border:var(--border);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:24px;
  animation:bounce 1s ease infinite;
}
.loader-logo svg{width:40px;height:40px;stroke:var(--ink);stroke-width:2.5;}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.loader-dots{display:flex;gap:8px;}
.loader-dots span{
  width:12px;height:12px;
  background:var(--ink);
  border-radius:50%;
  animation:dot-pulse 1.4s ease infinite;
}
.loader-dots span:nth-child(2){animation-delay:.2s;}
.loader-dots span:nth-child(3){animation-delay:.4s;}

@keyframes dot-pulse{
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.5);opacity:.5;}
}

/* Register Layout */
.register-wrapper{
  width:100%;
  max-width:380px;
  background:var(--white);
  border:var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  padding:36px 30px;
  text-align:center;
}

.brand-home{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:'Fredoka',sans-serif;
  font-weight:700;
  font-size:16px;
  color:var(--ink);
  text-decoration:none;
  margin-bottom:32px;
  transition:transform .2s ease;
}
.brand-home:hover{transform:translateX(-3px);}

.brand-home svg{width:16px;height:16px;stroke:currentColor;}

.container-icon{
  width:52px;height:52px;
  background:var(--sky);
  border:var(--border);
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
}
.container-icon svg{width:26px;height:26px;stroke:var(--ink);stroke-width:2.3;}

h1{
  font-size:28px;
  font-weight:700;
  margin-bottom:10px;
  letter-spacing:-.5px;
}

.subtitle{
  color:var(--gray);
  font-size:14px;
  font-weight:500;
  margin-bottom:30px;
}

/* Form */
.form-group{
  text-align:left;
  margin-bottom:16px;
}

.form-group label{
  display:block;
  font-weight:600;
  font-size:13.5px;
  margin-bottom:7px;
}

.form-input{
  width:100%;
  padding:12px 16px;
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:500;
  border:var(--border);
  border-radius:var(--radius-sm);
  background:var(--cream);
  transition:transform .15s ease, box-shadow .15s ease;
}

.form-input:focus{
  outline:none;
  transform:translate(-2px,-2px);
  box-shadow:var(--shadow-sm);
}

.form-input::placeholder{
  color:var(--gray-soft);
}

.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

/* Checkbox */
.checkbox-group{
  display:flex;
  align-items:flex-start;
  gap:10px;
  text-align:left;
  margin-bottom:24px;
}

.checkbox-group input[type="checkbox"]{
  width:20px;
  height:20px;
  border:var(--border);
  border-radius:6px;
  cursor:pointer;
  flex-shrink:0;
  margin-top:2px;
}

.checkbox-group label{
  font-size:13px;
  font-weight:500;
  color:var(--gray);
  line-height:1.5;
  cursor:pointer;
}

.checkbox-group label a{
  color:var(--green);
  font-weight:700;
  text-decoration:none;
}

.checkbox-group label a:hover{
  color:var(--green-dark);
}

/* Button */
.btn{
  width:100%;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-family:'Inter',sans-serif;
  font-weight:700;
  font-size:14.5px;
  padding:13px 24px;
  border-radius:var(--radius-pill);
  border:var(--border);
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
  margin-bottom:14px;
}

.btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
.btn:hover{transform:translate(-1px,-1px);box-shadow:7px 7px 0 var(--ink);}

.btn-primary{
  background:var(--green);
  color:#fff;
}

.btn-google{
  background:#fff;
  color:var(--ink);
  border:var(--border);
}

.btn-google img{
  width:20px;
  height:20px;
}

.btn-admin{
  background:var(--salmon);
  color:var(--ink);
  border:var(--border);
  font-weight:700;
}

.btn-admin:hover{
  background:#ff9d82;
}

.divider{
  display:flex;
  align-items:center;
  margin:24px 0;
  color:var(--gray-soft);
  font-size:13px;
  font-weight:600;
}

.divider::before,
.divider::after{
  content:'';
  flex:1;
  height:2.5px;
  background:var(--ink);
}

.divider span{
  padding:0 16px;
}

.footer-text{
  color:var(--gray);
  font-size:14px;
  font-weight:500;
  margin-top:24px;
}

.footer-text a{
  color:var(--green);
  font-weight:700;
  text-decoration:none;
  transition:color .2s;
}

.footer-text a:hover{
  color:var(--green-dark);
}

/* ===== Responsive - Landscape for Desktop/Tablet ===== */
@media(min-width:900px) and (orientation:landscape){
  body{
    padding:30px 24px;
  }
  
  .register-wrapper{
    max-width:680px;
    display:grid;
    grid-template-columns:1fr 0.85fr;
    gap:30px;
    padding:32px 30px;
    align-items:center;
    text-align:left;
  }
  
  .brand-home{
    grid-column:1 / -1;
    justify-self:flex-start;
    margin-bottom:16px;
    font-size:14.5px;
  }
  
  .register-left{
    order:1;
  }
  
  .register-right{
    order:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px 20px;
    background:var(--cream);
    border-radius:18px;
    border:var(--border);
  }
  
  .register-right .info-icon{
    width:56px;
    height:56px;
    background:var(--sky);
    border:var(--border);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:14px;
  }
  
  .register-right .info-icon svg{
    width:28px;
    height:28px;
    stroke:var(--ink);
  }
  
  .register-right h3{
    font-size:17px;
    font-weight:700;
    margin-bottom:8px;
  }
  
  .register-right p{
    color:var(--gray);
    font-size:12.5px;
    font-weight:500;
    line-height:1.5;
  }
  
  .container-icon{
    margin:0 0 16px 0;
    width:48px;
    height:48px;
  }
  
  .container-icon svg{
    width:24px;
    height:24px;
  }
  
  h1{
    text-align:left;
    font-size:24px;
    margin-bottom:8px;
  }
  
  .subtitle{
    text-align:left;
    font-size:13px;
    margin-bottom:24px;
  }
  
  .form-group{
    margin-bottom:12px;
  }
  
  .form-group label{
    font-size:12.5px;
  }
  
  .form-input{
    padding:10px 14px;
    font-size:13px;
  }
  
  .btn{
    padding:12px 20px;
    font-size:13.5px;
  }
  
  .divider{
    margin:16px 0;
    font-size:11.5px;
  }
  
  .footer-text{
    font-size:12.5px;
    margin-top:14px;
  }
  
  .checkbox-group{
    margin-bottom:16px;
  }
  
  .checkbox-group label{
    font-size:11.5px;
  }
}

/* Mobile */
@media(max-width:899px), (orientation:portrait){
  .register-right{
    display:none;
  }
  
  .form-row{
    grid-template-columns:1fr;
    gap:0;
  }
}

@media(max-width:480px){
  body{padding:24px 16px;}
  
  .register-wrapper{
    padding:36px 28px;
    border-radius:20px;
  }
  
  h1{font-size:26px;}
  .subtitle{font-size:14px;}
  
  .container-icon{
    width:52px;height:52px;
  }
  .container-icon svg{width:26px;height:26px;}
  
  .form-input{
    padding:13px 16px;
    font-size:14.5px;
  }
  
  .btn{
    padding:14px 24px;
    font-size:15px;
  }
  
  .checkbox-group label{
    font-size:12.5px;
  }
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loader-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
      <circle cx="8.5" cy="7" r="4"></circle>
      <polyline points="17 11 19 13 23 9"></polyline>
    </svg>
  </div>
  <div class="loader-dots">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- Main Register Wrapper -->
<div class="register-wrapper">
  <!-- Back to Home Link -->
  <a href="/" class="brand-home">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Kembali ke Beranda
  </a>
  
  <!-- Left: Form -->
  <div class="register-left">
    <div class="container-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="8.5" cy="7" r="4"></circle>
        <polyline points="17 11 19 13 23 9"></polyline>
      </svg>
    </div>

    <h1>Buat Akun Baru</h1>
    <p class="subtitle">Daftar dan mulai gunakan Vexalyn API</p>

    <!-- Google Sign Up Button -->
    <button class="btn btn-google" onclick="handleGoogleSignUp()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Daftar dengan Google
    </button>

    <!-- Admin Login Button -->
    <a href="/admin/login" class="btn btn-admin" style="text-decoration: none; margin-top: 10px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V11H5V6.3l7-3.11v8.8z"/>
      </svg>
      Admin Login
    </a>

    <div class="divider">
      <span>atau daftar dengan email</span>
    </div>

    <!-- Register Form -->
    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label for="firstname">Nama Depan</label>
          <input 
            type="text" 
            id="firstname" 
            name="firstname" 
            class="form-input" 
            placeholder="Nama"
            required
          >
        </div>

        <div class="form-group">
          <label for="lastname">Nama Belakang</label>
          <input 
            type="text" 
            id="lastname" 
            name="lastname" 
            class="form-input" 
            placeholder="Kamu"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-input" 
          placeholder="nama@email.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-input" 
          placeholder="Min. 8 karakter"
          minlength="8"
          required
        >
      </div>

      <div class="form-group">
        <label for="confirm-password">Konfirmasi Password</label>
        <input 
          type="password" 
          id="confirm-password" 
          name="confirm-password" 
          class="form-input" 
          placeholder="Ketik ulang password"
          minlength="8"
          required
        >
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">
          Saya setuju dengan <a href="#" target="_blank">Syarat & Ketentuan</a> dan <a href="#" target="_blank">Kebijakan Privasi</a>
        </label>
      </div>

      <button type="submit" class="btn btn-primary">
        Buat Akun
      </button>
    </form>

    <p class="footer-text">
      Sudah punya akun? <a href="/login">Masuk di sini</a>
    </p>
  </div>
  
  <!-- Right: Info (only visible on landscape desktop/tablet) -->
  <div class="register-right">
    <div class="info-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      </svg>
    </div>
    <h3>50 Request/Jam</h3>
    <p>Daftar sekali dan nikmati akses 50 request per jam ke semua endpoint Donghua API. Fair usage, gratis selamanya!</p>
  </div>
</div>

<script>
// Hide loading screen after page load
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading-screen').classList.add('hide');
  }, 800);
});

// Google Sign-Up Handler
function handleGoogleSignUp() {
  const demoMode = true;
  
  if (demoMode) {
    const demoUser = {
      name: 'Demo User',
      email: 'demo@gmail.com',
      picture: 'https://ui-avatars.com/api/?name=Demo+User&background=9BD8F4&color=15181F&size=128',
      provider: 'google'
    };
    
    console.log('Google Sign-Up (Demo Mode):', demoUser);
    localStorage.setItem('user', JSON.stringify(demoUser));
    alert('Pendaftaran berhasil! (Demo Mode)\nSelamat datang, ' + demoUser.name);
    window.location.href = '/';
    return;
  }
  
  try {
    google.accounts.id.initialize({
      client_id: 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com',
      callback: handleGoogleCallback
    });

    google.accounts.id.prompt((notification) => {
      if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
        alert('Google Sign-Up tidak tersedia. Silakan daftar dengan email.');
      }
    });
  } catch (error) {
    console.error('Google Sign-Up error:', error);
    alert('Google Sign-Up belum dikonfigurasi. Silakan daftar dengan email atau gunakan demo mode.');
  }
}

// Google Callback
function handleGoogleCallback(response) {
  const credential = response.credential;
  const payload = JSON.parse(atob(credential.split('.')[1]));
  
  console.log('Google Sign-Up Success:', payload);
  
  localStorage.setItem('user', JSON.stringify({
    name: payload.name,
    email: payload.email,
    picture: payload.picture,
    provider: 'google'
  }));
  
  alert('Pendaftaran berhasil! Selamat datang, ' + payload.name);
  window.location.href = '/';
}

// Email/Password Register Handler
function handleRegister(event) {
  event.preventDefault();
  
  const firstname = document.getElementById('firstname').value;
  const lastname = document.getElementById('lastname').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  const terms = document.getElementById('terms').checked;
  
  if (password !== confirmPassword) {
    alert('Password tidak cocok!');
    return;
  }
  
  if (!terms) {
    alert('Anda harus menyetujui Syarat & Ketentuan!');
    return;
  }
  
  console.log('Register attempt:', { firstname, lastname, email, password });
  
  const fullName = `${firstname} ${lastname}`;
  localStorage.setItem('user', JSON.stringify({
    name: fullName,
    email: email,
    provider: 'email'
  }));
  
  alert('Pendaftaran berhasil! Selamat datang, ' + fullName);
  window.location.href = '/';
}
</script>

</body>
</html>
