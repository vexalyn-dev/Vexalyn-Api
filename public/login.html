<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Vexalyn API</title>
<!-- 
  GOOGLE OAUTH SETUP:
  1. Buka Google Cloud Console: https://console.cloud.google.com
  2. Buat project baru atau pilih existing project
  3. Enable "Google+ API" di APIs & Services
  4. Buat OAuth 2.0 Client ID di Credentials
  5. Tambahkan authorized JavaScript origins: http://localhost:8000
  6. Copy Client ID dan ganti YOUR_GOOGLE_CLIENT_ID di meta tag & script
  7. Set demoMode = false di handleGoogleSignIn()
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#15181F;
  --cream:#FBF1E3;
  --white:#FFFFFF;
  --salmon:#FFAB92;
  --salmon-soft:#FFE4D9;
  --sky:#9BD8F4;
  --sky-soft:#DCF0FB;
  --lav:#CBC0F5;
  --lav-soft:#EAE5FC;
  --mint:#9BE3BC;
  --mint-soft:#DFF7EA;
  --green:#33B96A;
  --green-dark:#1D7A46;
  --gray:#6B7280;
  --gray-soft:#9AA0AC;
  --shadow: 6px 6px 0 var(--ink);
  --shadow-sm: 4px 4px 0 var(--ink);
  --shadow-lg: 8px 8px 0 var(--ink);
  --radius: 24px;
  --radius-sm: 16px;
  --radius-pill: 100px;
  --border: 3px solid var(--ink);
}

html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
}

h1,h2,h3,.brand{font-family:'Fredoka',sans-serif;}

/* Loading Screen */
#loading-screen{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:var(--cream);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:opacity .3s ease, visibility .3s ease;
}
#loading-screen.hide{opacity:0;visibility:hidden;}

.loader-logo{
  width:80px;height:80px;
  background:var(--salmon);
  border:var(--border);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:24px;
  animation:bounce 1s ease infinite;
}
.loader-logo svg{width:40px;height:40px;stroke:var(--ink);stroke-width:2.5;}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.loader-dots{display:flex;gap:8px;}
.loader-dots span{
  width:12px;height:12px;
  background:var(--ink);
  border-radius:50%;
  animation:dot-pulse 1.4s ease infinite;
}
.loader-dots span:nth-child(2){animation-delay:.2s;}
.loader-dots span:nth-child(3){animation-delay:.4s;}

@keyframes dot-pulse{
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.5);opacity:.5;}
}

/* Login Container */
.login-container{
  width:100%;
  max-width:520px;
  background:var(--white);
  border:var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  padding:48px 44px;
  text-align:center;
}

.brand-icon{
  width:60px;height:60px;
  background:var(--salmon);
  border:var(--border);
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 24px;
}
.brand-icon svg{width:30px;height:30px;stroke:var(--ink);stroke-width:2.3;}

h1{
  font-size:32px;
  font-weight:700;
  margin-bottom:12px;
  letter-spacing:-.5px;
}

.subtitle{
  color:var(--gray);
  font-size:15px;
  font-weight:500;
  margin-bottom:36px;
}

/* Form */
.form-group{
  text-align:left;
  margin-bottom:20px;
}

.form-group label{
  display:block;
  font-weight:600;
  font-size:14px;
  margin-bottom:8px;
}

.form-input{
  width:100%;
  padding:14px 18px;
  font-family:'Inter',sans-serif;
  font-size:15px;
  font-weight:500;
  border:var(--border);
  border-radius:var(--radius-sm);
  background:var(--cream);
  transition:transform .15s ease, box-shadow .15s ease;
}

.form-input:focus{
  outline:none;
  transform:translate(-2px,-2px);
  box-shadow:var(--shadow-sm);
}

.form-input::placeholder{
  color:var(--gray-soft);
}

/* Button */
.btn{
  width:100%;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-family:'Inter',sans-serif;
  font-weight:700;
  font-size:16px;
  padding:16px 28px;
  border-radius:var(--radius-pill);
  border:var(--border);
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
  margin-bottom:16px;
}

.btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
.btn:hover{transform:translate(-1px,-1px);box-shadow:7px 7px 0 var(--ink);}

.btn-primary{
  background:var(--green);
  color:#fff;
}

.btn-google{
  background:#fff;
  color:var(--ink);
  border:var(--border);
  position:relative;
}

.btn-google img{
  width:20px;
  height:20px;
}

.divider{
  display:flex;
  align-items:center;
  margin:24px 0;
  color:var(--gray-soft);
  font-size:13px;
  font-weight:600;
}

.divider::before,
.divider::after{
  content:'';
  flex:1;
  height:2.5px;
  background:var(--ink);
}

.divider span{
  padding:0 16px;
}

.footer-text{
  color:var(--gray);
  font-size:14px;
  font-weight:500;
  margin-top:24px;
}

.footer-text a{
  color:var(--green);
  font-weight:700;
  text-decoration:none;
  transition:color .2s;
}

.footer-text a:hover{
  color:var(--green-dark);
}

.back-home{
  display:inline-flex;
  align-items:center;
  gap:6px;
  color:var(--gray);
  font-size:14px;
  font-weight:600;
  text-decoration:none;
  margin-top:20px;
  transition:color .2s;
}

.back-home:hover{
  color:var(--ink);
}

.back-home svg{
  width:16px;
  height:16px;
  stroke:currentColor;
}

/* ===== Responsive Design ===== */

/* Desktop Large (1200px+) */
@media(min-width:1200px){
  .login-container{
    max-width:580px;
    padding:60px 52px;
  }
  h1{font-size:38px;}
  .subtitle{font-size:16.5px;}
  .form-input{padding:17px 22px;font-size:16px;}
  .btn{padding:18px 34px;font-size:17px;}
}

/* Desktop Medium (992px - 1199px) */
@media(min-width:992px) and (max-width:1199px){
  .login-container{
    max-width:540px;
    padding:52px 46px;
  }
  h1{font-size:34px;}
  .subtitle{font-size:16px;}
  .form-input{padding:16px 20px;font-size:15.5px;}
  .btn{padding:17px 30px;font-size:16.5px;}
}

/* Tablet (768px - 1024px) */
@media(min-width:768px) and (max-width:1024px){
  .login-container{
    max-width:480px;
    padding:44px 36px;
  }
  h1{font-size:30px;}
  .subtitle{font-size:15px;}
}

/* Mobile Landscape (576px - 767px) */
@media(min-width:576px) and (max-width:767px){
  .login-container{
    max-width:420px;
    padding:40px 32px;
  }
  h1{font-size:28px;}
  .subtitle{font-size:14.5px;margin-bottom:28px;}
  .brand-icon{width:56px;height:56px;}
  .brand-icon svg{width:28px;height:28px;}
}

/* Mobile Portrait (max-width: 575px) */
@media(max-width:575px){
  body{padding:16px;}
  
  .login-container{
    padding:32px 24px;
    border-radius:20px;
  }
  
  h1{font-size:26px;margin-bottom:10px;}
  .subtitle{font-size:14px;margin-bottom:24px;}
  
  .brand-icon{
    width:52px;
    height:52px;
    margin-bottom:20px;
  }
  .brand-icon svg{width:26px;height:26px;}
  
  .form-group{margin-bottom:16px;}
  .form-group label{font-size:13.5px;margin-bottom:6px;}
  .form-input{
    padding:12px 16px;
    font-size:14px;
    border-radius:14px;
  }
  
  .btn{
    padding:14px 24px;
    font-size:15px;
    margin-bottom:12px;
  }
  
  .divider{margin:20px 0;font-size:12.5px;}
  .divider span{padding:0 12px;}
  
  .footer-text{font-size:13.5px;margin-top:20px;}
  .back-home{font-size:13.5px;margin-top:16px;}
}

/* Mobile Small (max-width: 400px) */
@media(max-width:400px){
  .login-container{
    padding:28px 20px;
    border-radius:18px;
  }
  
  h1{font-size:24px;}
  .subtitle{font-size:13.5px;}
  
  .brand-icon{
    width:48px;
    height:48px;
    border-radius:14px;
    margin-bottom:18px;
  }
  .brand-icon svg{width:24px;height:24px;}
  
  .form-input{
    padding:11px 14px;
    font-size:13.5px;
  }
  
  .btn{
    padding:13px 20px;
    font-size:14.5px;
  }
  
  .btn-google img{width:18px;height:18px;}
  
  .divider{font-size:12px;}
  .footer-text{font-size:13px;}
  .back-home{font-size:13px;}
}

/* Landscape orientation for mobile */
@media(max-height:500px) and (orientation:landscape){
  body{padding:12px;}
  
  .login-container{
    padding:24px 28px;
    max-width:90%;
  }
  
  .brand-icon{
    width:44px;
    height:44px;
    margin-bottom:12px;
  }
  .brand-icon svg{width:22px;height:22px;}
  
  h1{font-size:22px;margin-bottom:8px;}
  .subtitle{font-size:13px;margin-bottom:16px;}
  
  .form-group{margin-bottom:12px;}
  .form-input{padding:10px 14px;}
  .btn{padding:12px 20px;margin-bottom:10px;}
  .divider{margin:12px 0;}
  .footer-text{margin-top:12px;}
  .back-home{margin-top:10px;}
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loader-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
      <path d="M2 17l10 5 10-5"></path>
      <path d="M2 12l10 5 10-5"></path>
    </svg>
  </div>
  <div class="loader-dots">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- Login Container -->
<div class="login-container">
  <div class="brand-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
      <path d="M2 17l10 5 10-5"></path>
      <path d="M2 12l10 5 10-5"></path>
    </svg>
  </div>

  <h1>Selamat Datang Kembali</h1>
  <p class="subtitle">Masuk ke akun Vexalyn API Anda</p>

  <!-- Google Sign In Button -->
  <button class="btn btn-google" onclick="handleGoogleSignIn()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Masuk dengan Google
  </button>

  <div class="divider">
    <span>atau masuk dengan email</span>
  </div>

  <!-- Login Form -->
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="email">Email</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        class="form-input" 
        placeholder="nama@email.com"
        required
      >
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input 
        type="password" 
        id="password" 
        name="password" 
        class="form-input" 
        placeholder="Masukkan password Anda"
        required
      >
    </div>

    <button type="submit" class="btn btn-primary">
      Masuk
    </button>
  </form>

  <p class="footer-text">
    Belum punya akun? <a href="/register">Daftar sekarang</a>
  </p>

  <a href="/" class="back-home">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Kembali ke Beranda
  </a>
</div>

<script>
// Hide loading screen after page load
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading-screen').classList.add('hide');
  }, 800);
});

// Google Sign-In Handler
function handleGoogleSignIn() {
  // Demo mode - simulate Google Sign-In
  // In production, user needs to setup Google OAuth Client ID
  
  const demoMode = true; // Set to false when you have real Google Client ID
  
  if (demoMode) {
    // Simulate Google login with demo data
    const demoUser = {
      name: 'Demo User',
      email: 'demo@gmail.com',
      picture: 'https://ui-avatars.com/api/?name=Demo+User&background=FFAB92&color=15181F&size=128',
      provider: 'google'
    };
    
    console.log('Google Sign-In (Demo Mode):', demoUser);
    
    // Store user data in localStorage
    localStorage.setItem('user', JSON.stringify(demoUser));
    
    // Redirect to homepage
    alert('Login berhasil! (Demo Mode)\nSelamat datang, ' + demoUser.name);
    window.location.href = '/';
    return;
  }
  
  // Production mode - requires valid Google Client ID
  // Replace YOUR_GOOGLE_CLIENT_ID with your actual client ID from Google Cloud Console
  try {
    google.accounts.id.initialize({
      client_id: 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com',
      callback: handleGoogleCallback
    });

    google.accounts.id.prompt((notification) => {
      if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
        alert('Google Sign-In tidak tersedia. Silakan login dengan email.');
      }
    });
  } catch (error) {
    console.error('Google Sign-In error:', error);
    alert('Google Sign-In belum dikonfigurasi. Silakan login dengan email atau gunakan demo mode.');
  }
}

// Google Callback
function handleGoogleCallback(response) {
  const credential = response.credential;
  
  // Decode JWT token to get user info
  const payload = JSON.parse(atob(credential.split('.')[1]));
  
  console.log('Google Sign-In Success:', payload);
  
  // Store user data in localStorage
  localStorage.setItem('user', JSON.stringify({
    name: payload.name,
    email: payload.email,
    picture: payload.picture,
    provider: 'google'
  }));
  
  // Redirect to homepage
  alert('Login berhasil! Selamat datang, ' + payload.name);
  window.location.href = '/';
}

// Email/Password Login Handler
function handleLogin(event) {
  event.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  // TODO: Implement actual authentication
  // For now, just demo login
  console.log('Login attempt:', { email, password });
  
  // Simulate successful login
  localStorage.setItem('user', JSON.stringify({
    name: email.split('@')[0],
    email: email,
    provider: 'email'
  }));
  
  alert('Login berhasil! Selamat datang, ' + email.split('@')[0]);
  window.location.href = '/';
}
</script>

</body>
</html>
